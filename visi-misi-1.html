<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visi Misi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins';
            background-image: url('background-utama.png');
        }
        nav {
            background: #701F31;
            box-shadow: 0 0 5px black;
            height: 55px;
            width: 1280px;
            margin-top: -10px;
            margin-left: -10px;
            margin-right: -10px;
        }
        .logo img {
            margin-top: -35px;
            margin-left: -25px;
        }
        .side-bar {
            background: #701F31;
            height: 900px;
            width: 100px;
        }
        .judul {
            color: #EBD4C1;
            display: flex;
            justify-content: center;
        }
        .kandidat {
            color: #851521;
            display: flex;
            justify-content: center;
        }
        .nama {
            color: #701F31;
            display: flex;
            justify-content: center;
        }
        .foto img {
             height: 170px;
             width: 170px;
        }
        .deskripsi {
            font-size: 20px;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>    
<div>
    <nav>
        <div class="logo">
            <img src="Logo PilihAja.png" width="200px">
        </div>
    </nav>

    <div class="judul">
        <h1>Visi Misi</h1>
    </div>

    <div class="kandidat">
        <div class="kandidat-1">
            <h2>Detail Kandidat 1</h2>
        </div>
        <div class="nama">
            <h3>Deswita M</h3>
        </div>
        <div class="foto">
            <img src="Deswita.jpeg">
        </div>
        <div class="deskripsi">
            <p></p>
        </div>
        <div class="button-voting-1">
        <button style="width: 150px; border-radius: 15px; background-color: #571C21; border: 0px;"><span><b>Voting</b></span></button>
        </div>
        <div class="button-kembali">
        <button style="width: 150px; border-radius: 15px; background-color: #851521; border: 0px;"><span><b>Kembali</b></span></button>
        </div>
    </div>

    <div class="side-bar">

        <div class="button-voting-2">
            <button style="width: 150px; border-radius: 20px; background-color: #EBD4C1; border: 0px;"><span><b>Voting</b></span></button>
        </div>
        <div class="button-hasil-voting">
            <button style="width: 150px; border-radius: 20px; background-color: #EBD4C1; border: 0px;"><span><b>Hasil Voting</b></span></button>
        </div>

        <span>Hi, 1234!</span>

        <div class="button-logout">
            <button style="width: 155px; border-radius: 20px; background-color: #EBD4C1; border: 0px;"><span><b>Log out</b></span></button>
        </div>

    </div>
</div>
</body>
</html>
