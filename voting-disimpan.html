<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voting disimpan</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "poppins";
      }

      nav {
        background: #701f31;
        box-shadow: 0 0 5px black;
        height: 55px;
        width: 1280px;
        margin-top: -10px;
        margin-left: -10px;
        margin-right: -10px;
      }

      .logo img {
        margin-top: -35px;
        margin-left: -25px;
      }

      body {
        background-image: url("background-utama.png");
        color: white;
      }

      popup {
        background-color: #ebd4c1;
      }

      popup h2 {
        color: #701f31;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav>
      <div class="logo">
        <img src="Logo PilihAja.png" alt="" width="200px" />
      </div>
    </nav>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="button">
        <button><span>Voting</span></button>
      </div>
      <div class="button">
        <button><span>Hasil Voting</span></button>
      </div>

      <div class="button">
        <p>Hi, 1234!</p>
        <button><span>Log out</span></button>
      </div>
    </div>

    <!--Notification-->
    <div class="notif">
      <div class="popup">
        <h2>
          Pilihan anda sudah kami simpan! Terima kasih sudah berpartisipasi
          dalam pemilihan ini.
        </h2>
      </div>
    </div>

    <div class="kembali">
      <button
        style="
          height: 30px;
          width: 110px;
          margin-top: 10px;
          border-radius: 10px;
          background-color: #ebd4c1;
          border: 0px;
          font-size: 20px;
        "
      >
        <h4>Kembali ke Halaman Log in</h4>
      </button>
    </div>
  </body>
</html>
