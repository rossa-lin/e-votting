<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>

  <style>
    body {
      background-image: url("background-utama.png");
      font-family: "Poppins", sans-serif;
      margin: 0;
    }

    /* Navbar */
    .navbar {
      padding: 15px 40px;
    }

    .navbar img {
      height: 45px;
    }

    /* Section kandidat */
    .kandidat {
      text-align: center;
      margin-top: 40px;
    }

    /* Container kandidat */
    .tabel-kandidat {
      display: flex;
      justify-content: center;
      gap: 30px; /* jarak antar kandidat */
      margin-top: 30px;
    }

    /* Card kandidat */
    .Deswita {
      background: white;
      width: 220px;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .Deswita img {
      width: 100%;
      border-radius: 8px;
    }

    /* Button */
    .detail {
      margin-top: 10px;
      padding: 8px 16px;
      border: none;
      background-color: #723238;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>

  <body>
    <nav class="navbar">
      <div class="logo"></div>
      <img src="Logo PilihAja.png" alt="" />
    </nav>

    <main class="kandidat">
      <h2>Daftar Kandidat</h2>

      <div class="tabel-kandidat">
        <!---Kandidat 1--->
        <div class="Deswita">
          <img src="Deswita.jpeg" alt="Kandidat 1" />
          <h2>Kandidat 1</h2>
          <h4>Deswita Mahrifiani</h4>
          <button class="detail">Detail</button>
        </div>
      </div>
    </main>
  </body>
</html>
