<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Kandidat</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "poppins";
      }

      nav {
        background: #701f31;
        box-shadow: 0 0 5px black;
        height: 55px;
        width: 1280px;
        margin-top: -10px;
        margin-left: -10px;
        margin-right: -10px;
      }

      .logo img {
        margin-top: -35px;
        margin-left: -25px;
      }

      body {
        background-image: url("background-utama.png");
        color: white;
      }

      /* LAYOUT */
      .sidebar {
        width: 220px;
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .judul h1 {
        color: #ebd4c1;
        text-align: center;
        margin-bottom: 0px;
        font-size: 55px;
      }

      .kandidats {
        display: flex;
        justify-content: center;
        gap: 30px;

        margin: 50px;
        padding: 50px;
      }

      .kandidat img {
        width: 170px;
        height: 170px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 15px;
      }

      .profil {
        background-color: #ebd4c1;
        padding-top: 25px;
        padding-bottom: 35px;
        padding-left: 30px;
        padding-right: 30px;
        border-radius: 30px;
      }

      .profil h1 {
        color: #6f120b;
        text-align: center;
      }

      .profil h3 {
        color: #6f120b;
        text-align: center;
        margin-top: -5px;
      }

      .detail {
        display: flex;
        justify-content: center;
        margin-top: 5px;
      }

      .detail h4 {
        color: #ebd4c1;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <nav>
      <div class="logo">
        <img src="Logo PilihAja.png" alt="" width="200px" />
      </div>
    </nav>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="button">
        <button><span>Voting</span></button>
      </div>
      <div class="button">
        <button><span>Hasil Voting</span></button>
      </div>

      <div class="button">
        <p>Hi, 1234!</p>
        <button><span>Log out</span></button>
      </div>
    </aside>

    <!-- KANDIDAT -->
    <div class="judul">
      <h1>Daftar Kandidat</h1>
    </div>

    <div class="kandidats">
      <!-- KANDIDAT 1 -->
      <div class="kandidat">
        <div class="profil">
          <img src="Deswita.jpeg" alt="" />
          <h1>Kandidat 1</h1>
          <h3>Deswita M</h3>

          <div class="detail">
            <button
              style="
                height: 30px;
                width: 110px;
                margin-top: 10px;
                border-radius: 10px;
                background-color: #723238;
                border: 0px;
                font-size: 20px;
              "
            >
              <h4>Detail</h4>
            </button>
          </div>
        </div>
      </div>

      <!-- KANDIDAT 2 -->
      <div class="kandidat">
        <div class="profil">
          <img src="Zila.jpeg" alt="" />
          <h1>Kandidat 2</h1>
          <h3>Zila Asza A</h3>

          <div class="detail">
            <button
              style="
                height: 30px;
                width: 110px;
                margin-top: 10px;
                border-radius: 10px;
                background-color: #723238;
                border: 0px;
                font-size: 20px;
              "
            >
              <h4>Detail</h4>
            </button>
          </div>
        </div>
      </div>

      <!-- KANDIDAT 3 -->
      <div class="kandidat">
        <div class="profil">
          <img src="Wiwit.jpeg" alt="" />
          <h1>Kandidat 3</h1>
          <h3>Wiwit Nur S</h3>

          <div class="detail">
            <button
              style="
                height: 30px;
                width: 110px;
                margin-top: 10px;
                border-radius: 10px;
                background-color: #723238;
                border: 0px;
                font-size: 20px;
              "
            >
              <h4>Detail</h4>
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
